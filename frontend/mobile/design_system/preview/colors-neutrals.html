<!doctype html><html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: var(--bg-canvas); }
  .card { padding: 20px 24px; }
  .ramp { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .chip { border-radius: 12px; height: 96px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--ink-100); }
  .chip .n { font-weight: 600; font-size: 11px; }
  .chip .h { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
  .lt { color: #fff; border-color: rgba(255,255,255,0.15); } .dk { color: var(--brand-primary); }
  h6 { margin: 0 0 10px; font-size: 13px; color: var(--ink-500); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .note { margin-top: 10px; font-size: 12px; color: var(--ink-400); }
</style></head>
<body><div class="card">
  <h6>Neutrals · cool, indigo-tinted</h6>
  <div class="ramp">
    <div class="chip lt" style="background:#0E0D2A"><span class="n">900</span><span class="h">#0E0D2A</span></div>
    <div class="chip lt" style="background:#1F1D3D"><span class="n">700</span><span class="h">#1F1D3D</span></div>
    <div class="chip lt" style="background:#4A4870"><span class="n">500</span><span class="h">#4A4870</span></div>
    <div class="chip lt" style="background:#6F6D8E"><span class="n">400</span><span class="h">#6F6D8E</span></div>
    <div class="chip dk" style="background:#9794AE"><span class="n">300</span><span class="h">#9794AE</span></div>
    <div class="chip dk" style="background:#C8C6D6"><span class="n">200</span><span class="h">#C8C6D6</span></div>
    <div class="chip dk" style="background:#E5E4EE"><span class="n">100</span><span class="h">#E5E4EE</span></div>
    <div class="chip dk" style="background:#F4F4F8"><span class="n">050</span><span class="h">#F4F4F8</span></div>
  </div>
  <div class="note">Never pure gray — every neutral carries a slight indigo cast so it stays related to the brand.</div>
</div></body></html>
