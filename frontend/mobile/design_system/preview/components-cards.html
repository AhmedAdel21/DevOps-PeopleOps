<!doctype html><html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: var(--bg-page); }
  .card { padding: 24px; }
  h6 { margin: 0 0 14px; font-size: 13px; color: var(--ink-500); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .c { border-radius: 20px; padding: 18px; display: flex; flex-direction: column; gap: 10px; min-height: 170px; transition: transform 220ms cubic-bezier(.2,.7,.2,1), box-shadow 220ms; }
  .c:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
  .c .icon { width: 36px; height: 36px; border-radius: 10px; background: var(--brand-accent-100); color: var(--brand-accent-700); display: inline-flex; align-items: center; justify-content: center; font-weight: 700; }
  .c .t { font-weight: 700; color: var(--brand-primary); font-size: 16px; line-height: 1.25; }
  .c .d { font-size: 12px; color: var(--ink-500); line-height: 1.55; }
  .c .l { margin-top: auto; font-size: 12px; font-weight: 600; color: var(--brand-accent-700); }
  .c.white { background: #fff; border: 1px solid var(--ink-100); box-shadow: var(--shadow-sm); }
  .c.glass { background: var(--grad-glass-light); border: 1px solid rgba(255,255,255,0.65); backdrop-filter: blur(18px); box-shadow: var(--shadow-md); }
  .c.indigo { background: var(--brand-primary); color: #fff; border: 1px solid rgba(255,255,255,0.1); box-shadow: var(--shadow-lg); }
  .c.indigo .t, .c.indigo .l { color: #fff; }
  .c.indigo .d { color: rgba(255,255,255,0.78); }
  .c.indigo .icon { background: rgba(255,255,255,0.14); color: #fff; }
</style></head>
<body><div class="card">
  <h6>Cards · white · glass · indigo</h6>
  <div class="grid">
    <div class="c white"><span class="icon">W</span><div class="t">Web Development</div><div class="d">Custom apps and sites built to scale with your business.</div><div class="l">Learn more →</div></div>
    <div class="c glass"><span class="icon">M</span><div class="t">Mobile Apps</div><div class="d">Native iOS and Android with a shared product spine.</div><div class="l">Learn more →</div></div>
    <div class="c indigo"><span class="icon">A</span><div class="t">AI &amp; Chatbots</div><div class="d">Always-on customer experiences powered by GPT-class models.</div><div class="l">Learn more →</div></div>
  </div>
</div></body></html>
