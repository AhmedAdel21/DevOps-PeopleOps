<!doctype html><html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: var(--bg-canvas); }
  .card { padding: 24px 28px; }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 8px 0; border-bottom: 1px dashed var(--ink-100); }
  .row:last-child { border: none; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); min-width: 130px; }
  .spec { font-family: var(--font-en); color: var(--brand-primary); letter-spacing: -0.02em; line-height: 1.05; font-weight: 700; }
  h6 { margin: 0 0 14px; font-size: 13px; color: var(--ink-500); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
</style></head>
<body><div class="card">
  <h6>Display · Livvic 700</h6>
  <div class="row"><div class="meta">88 / 1.05 · -2%</div><div class="spec" style="font-size:64px">Innovate. Inspire.</div></div>
  <div class="row"><div class="meta">72 / 1.08 · -2%</div><div class="spec" style="font-size:48px">Digital journey</div></div>
  <div class="row"><div class="meta">56 / 1.1 · -2%</div><div class="spec" style="font-size:40px">One-stop shop</div></div>
</div></body></html>
