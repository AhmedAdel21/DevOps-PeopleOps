<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: var(--bg-canvas); }
  .card { padding: 22px 24px; }
  .row { display: grid; grid-template-columns: 90px 1fr 60px; gap: 16px; align-items: center; padding: 6px 0; }
  .name { font-family: var(--font-mono); font-size: 12px; color: var(--ink-500); }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); text-align: right; }
  .bar { background: var(--brand-accent-100); border: 1px solid var(--brand-accent-300); height: 12px; border-radius: 4px; }
  h6 { margin: 0 0 12px; font-size: 13px; color: var(--ink-500); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
</style></head>
<body><div class="card">
  <h6>Spacing tokens</h6>
  <div class="row"><div class="name">space-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="name">space-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="name">space-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="name">space-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="name">space-6</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="name">space-8</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="name">space-12</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="name">space-16</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
  <div class="row"><div class="name">space-24</div><div class="bar" style="width:96px"></div><div class="px">96 px</div></div>
  <div class="row"><div class="name">space-32</div><div class="bar" style="width:128px"></div><div class="px">128 px</div></div>
</div></body></html>
