<!doctype html><html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: var(--bg-canvas); }
  .card { padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .tile { border-radius: 14px; padding: 14px; border: 1px solid var(--ink-100); display: flex; flex-direction: column; gap: 10px; }
  .tile .swatch { height: 48px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.04); }
  .tile .name { font-weight: 600; font-size: 13px; color: var(--brand-primary); }
  .tile .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); }
  .tile .bg { font-family: var(--font-mono); font-size: 10px; color: var(--ink-400); }
  h6 { margin: 0 0 12px; font-size: 13px; color: var(--ink-500); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
</style></head>
<body><div class="card">
  <h6>Semantic · status colors</h6>
  <div class="grid">
    <div class="tile" style="background:#E5F5EE"><div class="swatch" style="background:#1F9D74"></div><div class="name">Success</div><div class="hex">#1F9D74</div><div class="bg">bg #E5F5EE</div></div>
    <div class="tile" style="background:#FBF1DC"><div class="swatch" style="background:#D98A00"></div><div class="name">Warning</div><div class="hex">#D98A00</div><div class="bg">bg #FBF1DC</div></div>
    <div class="tile" style="background:#FBE5E5"><div class="swatch" style="background:#D14545"></div><div class="name">Danger</div><div class="hex">#D14545</div><div class="bg">bg #FBE5E5</div></div>
    <div class="tile" style="background:#E4E5FD"><div class="swatch" style="background:#787CF2"></div><div class="name">Info</div><div class="hex">#787CF2</div><div class="bg">bg #E4E5FD</div></div>
  </div>
</div></body></html>
