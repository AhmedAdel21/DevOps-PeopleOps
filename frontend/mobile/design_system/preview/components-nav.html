<!doctype html><html><head><meta charset="utf-8"><title>Nav</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: var(--bg-canvas); }
  .card { padding: 0; height: 220px; position: relative; overflow: hidden; }
  .bg { position: absolute; inset: 0; background: var(--grad-hero); }
  .blob { position: absolute; width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle, #A6A9F7 0%, transparent 65%); top: -80px; right: -50px; filter: blur(24px); }
  .nav { position: absolute; top: 16px; left: 16px; right: 16px; height: 56px; border-radius: 999px; background: rgba(255,255,255,0.14); backdrop-filter: blur(18px) saturate(140%); -webkit-backdrop-filter: blur(18px) saturate(140%); border: 1px solid rgba(255,255,255,0.28); display: flex; align-items: center; padding: 0 8px 0 18px; gap: 14px; box-shadow: 0 12px 30px rgba(38,34,97,0.28); }
  .logo { display: flex; align-items: center; }
  .logo img { height: 22px; filter: brightness(0) invert(1); }
  .links { display: flex; gap: 18px; margin-left: 14px; }
  .links a { color: rgba(255,255,255,0.92); font-size: 13px; font-weight: 500; text-decoration: none; }
  .links a.active { color: #fff; font-weight: 700; }
  .spacer { flex: 1; }
  .lang { color: rgba(255,255,255,0.78); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; padding: 0 10px; }
  .cta { background: #fff; color: var(--brand-primary); height: 40px; padding: 0 18px; border-radius: 999px; font-size: 13px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; border: none; }
  .meta { position: absolute; bottom: 14px; left: 24px; font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.7); }
</style></head>
<body><div class="card">
  <div class="bg"></div><div class="blob"></div>
  <div class="nav">
    <div class="logo"><img src="../assets/devop-logo.png" alt=""></div>
    <div class="links">
      <a class="active" href="#">Home</a>
      <a href="#">Services</a>
      <a href="#">Solutions</a>
      <a href="#">Careers</a>
      <a href="#">Blog</a>
      <a href="#">Contact</a>
    </div>
    <div class="spacer"></div>
    <span class="lang">AR</span>
    <button class="cta">Start now →</button>
  </div>
  <div class="meta">Glass nav · 14% white fill · 18px blur · pill radius · scrolled state</div>
</div></body></html>
