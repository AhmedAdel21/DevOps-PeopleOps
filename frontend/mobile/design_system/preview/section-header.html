<!doctype html><html><head><meta charset="utf-8"><title>Section header</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: var(--bg-page); }
  .card { padding: 36px 28px; }
  .eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-en); font-weight: 600; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--brand-accent-700); margin-bottom: 12px; }
  .eyebrow::before { content: ""; width: 24px; height: 1px; background: var(--brand-accent-700); display: inline-block; }
  h2 { margin: 0 0 12px; font: 700 32px/1.18 var(--font-en); color: var(--brand-primary); letter-spacing: -0.02em; max-width: 520px; }
  .lede { margin: 0; font-size: 15px; line-height: 1.6; color: var(--ink-500); max-width: 540px; }
  .meta { margin-top: 18px; font-family: var(--font-mono); font-size: 10px; color: var(--ink-400); }
</style></head>
<body><div class="card">
  <div class="eyebrow">Our services</div>
  <h2>End-to-end digital craft for ambitious teams.</h2>
  <p class="lede">We build, ship, and grow software products across web, mobile, and AI — from your first sketch all the way to production.</p>
  <div class="meta">Eyebrow → h2 → lede · 12 / 12 / 18 px stack · max-width 520–540 px</div>
</div></body></html>
